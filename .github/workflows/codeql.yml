name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 6.11.0
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          target: desktop
          arch: linux_gcc_64
          modules: qtsvg
          cache: true
          setup-python: true
          install-deps: true

      - name: Export Qt environment
        run: |
          set -euo pipefail
          qt6_dir="${QT_ROOT_DIR}/lib/cmake/Qt6"
          test -f "${qt6_dir}/Qt6Config.cmake"
          echo "QT_DIR=${QT_ROOT_DIR}" >> "${GITHUB_ENV}"
          echo "Qt6_DIR=${qt6_dir}" >> "${GITHUB_ENV}"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install CMake 4.2.3
        run: |
          cmake_url='https://github.com/Kitware/CMake/releases/download/v4.2.3/cmake-4.2.3-linux-x86_64.tar.gz'
          cmake_archive="${RUNNER_TEMP}/cmake.tar.gz"
          cmake_root="${RUNNER_TEMP}/cmake"
          wget -qO "${cmake_archive}" "${cmake_url}"
          mkdir -p "${cmake_root}"
          tar -xzf "${cmake_archive}" -C "${cmake_root}" --strip-components=1
          echo "${cmake_root}/bin" >> "${GITHUB_PATH}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality
          config: |
            paths:
              - src
            paths-ignore:
              - build
              - src/libraries

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake -S . -B build/codeql -G Ninja -DARC_QT6_BUILD=ON -DUSE_QLITEHTML=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/codeql --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

